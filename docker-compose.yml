services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: aegis_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - AEGIS_NEO4J_ENABLED=true
      - AEGIS_NEO4J_URI=bolt://neo4j:7687
      - AEGIS_NEO4J_USER=neo4j
      - AEGIS_NEO4J_PASSWORD=changeme
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - aegis_network

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: aegis_frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - API_URL=http://backend:8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aegis_network

  redis:
    image: redis:alpine
    container_name: aegis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegis_network

  neo4j:
    image: neo4j:5-community
    container_name: aegis_neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/changeme
      - NEO4J_PLUGINS=["apoc"]
    restart: unless-stopped
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aegis_network

networks:
  aegis_network:
    driver: bridge

volumes:
  redis_data:
  neo4j_data:
